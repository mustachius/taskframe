name: vhs

# Renders demo.tape and demo-classic.tape into their gifs on a Linux runner
# and commits the results back to the repo.
#
# We install ffmpeg + ttyd + VHS ourselves instead of using
# charmbracelet/vhs-action@v2: that action's bundled ffmpeg installer is broken.
# It looks for an "ffmpeg-n5.1 ... linux64-gpl-5.1.tar.xz" asset in the *latest*
# BtbN/FFmpeg-Builds release, which no longer ships n5.1 builds, so it always
# fails with "Failed to install ffmpeg". VHS itself downloads its headless
# Chromium (via go-rod) on first run, so we only need ffmpeg + ttyd on PATH.
on:
  push:
    paths:
      - demo.tape
      - demo-classic.tape
      - .github/workflows/vhs.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Install ttyd
        run: |
          sudo curl -fsSL \
            https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64 \
            -o /usr/local/bin/ttyd
          sudo chmod +x /usr/local/bin/ttyd
      - name: Install VHS and taskframe
        run: |
          go install github.com/charmbracelet/vhs@v0.11.0
          go install ./cmd/taskframe
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Render demo
        # charmbracelet/vhs-action set these two so lipgloss/termenv renders
        # true colors: GitHub sets CI=true, which makes termenv ignore ANSI
        # (degrading the gradient logo to grayscale), and COLORTERM=truecolor
        # enables full-color output. We replicate that here.
        env:
          CI: ""
          COLORTERM: truecolor
        run: |
          vhs demo.tape
          vhs demo-classic.tape
      - name: Commit demo gifs
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore: regenerate demo gifs [skip ci]"
          file_pattern: demo*.gif
