name: vhs

# Renders demo.tape into demo.gif on a Linux runner (VHS needs ttyd/ffmpeg,
# which the vhs-action provides) and commits the result back to the repo.
on:
  push:
    paths: [demo.tape]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install taskframe on PATH
        run: |
          go install ./cmd/taskframe
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - uses: charmbracelet/vhs-action@v2
        with:
          path: demo.tape
      - name: Commit demo.gif
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate demo.gif [skip ci]"
          file_pattern: demo.gif
